user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 512;
}

stream {
    log_format proxy_log "$remote_addr [$time_local] port=$server_port SNI=$ssl_preread_server_name routed=$backend_addr tx=$bytes_sent";
    access_log /var/log/nginx/stream_access.log proxy_log;

    map $ssl_preread_server_name $backend_addr {
        ozon.ru  127.0.0.1:8443;   # EE-TLS: fake-TLS with SNI mask
        ""       127.0.0.1:8443;   # DD-Secure: empty SNI (mobile TSPU bypass)
        default  127.0.0.1:8444;   # everything else → redirect to website
    }

    server {
        listen 443;   # Main port — EE-TLS mode (most ISPs)
        listen 3389;  # RDP port — DD-Secure mode (Megafon 4G / deep TSPU bypass)
        ssl_preread on;
        proxy_pass $backend_addr;
        proxy_connect_timeout 3s;
        proxy_timeout 3600s;
        proxy_buffer_size 16k;
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # Fallback HTTPS server — returns a real website for unknown SNI
    # Prevents fingerprinting: scanners get a real TLS cert instead of connection refused
    server {
        listen 8444 ssl;
        server_name _;
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        return 301 https://YOUR_WEBSITE$request_uri;
    }

    # HTTP → HTTPS redirect + Let's Encrypt ACME challenge
    server {
        listen 80;
        server_name YOUR_DOMAIN;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://YOUR_WEBSITE$request_uri; }
    }
}
